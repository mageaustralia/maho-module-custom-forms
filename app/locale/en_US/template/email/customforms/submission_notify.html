<!--@subject New submission: {{var form_name}} @-->
<!--@vars
{"var form_name":"Form name","var submission_id":"Submission id","var submitted_at":"Submitted at","var ip":"Submitter IP","var items_html":"Submitted values (rendered)"}
@-->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="color-scheme" content="light dark">
    <title>New submission: {{var form_name}}</title>
</head>
<body style="margin:0; padding:0; width:100%; background-color:#f4f5f7; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
    <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all;">New submission #{{var submission_id}} for {{var form_name}}.</div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f4f5f7;">
        <tr>
            <td align="center" style="padding:24px 12px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:100%; max-width:600px; background-color:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #e5e7eb;">
                    <tr>
                        <td style="background-color:#166534; padding:20px 28px;">
                            <span style="font-family:Arial,Helvetica,sans-serif; font-size:18px; line-height:24px; font-weight:bold; color:#ffffff;">New submission - {{var form_name}}</span>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px;">
                            <p style="margin:0 0 16px; font-family:Arial,Helvetica,sans-serif; font-size:12px; line-height:18px; color:#777777;">Submission #{{var submission_id}} &middot; {{var submitted_at}} &middot; IP {{var ip}}</p>
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; width:100%;">
                                <tbody>
                                    {{var items_html}}
                                </tbody>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:18px 28px; background-color:#f9fafb; border-top:1px solid #eef0f2;">
                            <p style="margin:0; font-family:Arial,Helvetica,sans-serif; font-size:12px; line-height:18px; color:#9ca3af;">Sent by the Custom Forms module. Manage submissions under CMS &gt; Custom Forms &gt; Submitted Data.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
